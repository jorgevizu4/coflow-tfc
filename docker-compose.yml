services:
  db-v2:
    image: mysql:8.0
    container_name: coflow-db-v2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coflow
    ports:
      - "3307:3306"
    volumes:
      - coflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-v2:
    build: ./backend-v2
    container_name: coflow-backend-v2
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-v2:3306/coflow?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET_KEY: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      db-v2:
        condition: service_healthy

  frontend:
    build: ./frontend-web
    container_name: coflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend-v2

volumes:
  coflow_mysql_data:
