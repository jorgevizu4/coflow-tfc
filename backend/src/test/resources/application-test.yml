# Test configuration
spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///taskmanager_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: localhost
    port: 1025

app:
  jwt:
    secret: test-secret-key-for-testing-purposes-only-must-be-at-least-256-bits
    expiration: 86400000
  file-storage:
    path: ${java.io.tmpdir}/taskmanager-test
  audit:
    retention-days: 90

logging:
  level:
    com.taskmanager: DEBUG
    org.hibernate.SQL: DEBUG
