server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: task-manager-api

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/taskmanager
    username: taskmanager
    password: taskmanager123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Actualizar schema automáticamente
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Mail Configuration (MailHog for development)
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:MiClaveSecretaMuyLargaParaJWTQueDebeSerAlMenos256BitsParaHS256AlgorithmSeguro2024}
  expiration: 86400000  # 24 horas en millisegundos
  refresh-expiration: 604800000  # 7 días

# Application Configuration
app:
  file-storage:
    upload-dir: ./uploads
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173}
  audit:
    retention-days: 90

# Logging
logging:
  level:
    root: INFO
    com.taskmanager: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# Profile: production
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.taskmanager: INFO
    org.springframework.security: WARN
